<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>นามบัตรออนไลน์ของฉัน</title>

  <!-- Google Fonts: Noto Sans Thai -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- CSS ภายนอก -->
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <main class="card">

    <img class="card__avatar"
      src="https://avatars.githubusercontent.com/u/9919?v=4"
      alt="รูปโปรไฟล์">

    <h1 id="card-name" class="card__name">
    Naphatsakorn Timinkul
    </h1>

    <p class="card__title">
      นักศึกษาวิศวกรรมคอมพิวเตอร์
    </p>

    <p class="card__bio">
      หัวข้อพิเศษทางด้านการพัฒนาซอฟแวร์
    </p>

    <ul class="card__links">
      <li>
        <a href="https://github.com/napassakornti-prog" target="_blank">
          GitHub
        </a>
      </li>

      <li>
        <a href="mailto:napassakorn.ti@ksu.ac.th">
          Email
        </a>
      </li>
    </ul>

    <button id="theme-toggle" class="card__button">
      🌙 โหมดกลางคืน
    </button>

    <footer id="card-footer" class="card__footer"></footer>

    <p class="card__bio">
      ลองพิมพ์ชื่อของคุณที่นี่
    </p>

    <input
    id="name-input"
    type="text"
    class="card__input"
    placeholder="ข้อความของคุณ"
>

  </main>

  <!-- JS -->
  <script src="./script.js"></script>

</body>
</html>
